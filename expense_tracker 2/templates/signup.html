<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        .bg-finance {
            background-image: url('https://images.unsplash.com/photo-1565514158740-064f34bd6cfd?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-finance flex items-center justify-center h-screen">
    <div class="absolute inset-0 bg-black bg-opacity-60"></div>
    
    <div class="relative z-10 bg-white p-8 rounded-lg shadow-2xl w-96 animate__animated animate__fadeIn">
        <h2 class="text-3xl font-bold mb-6 text-blue-600 text-center">Finance Tracker</h2>
        <h3 class="text-xl font-semibold mb-4 text-gray-800">Create an Account</h3>
        
        <form id="registerForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Full Name</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500 transition-all" 
                       id="name" 
                       type="text" 
                       required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500 transition-all" 
                       id="email" 
                       type="email" 
                       required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500 transition-all" 
                       id="password" 
                       type="password" 
                       required>
            </div>
            <div id="errorMessage" class="text-red-500 text-sm mb-4 hidden">
                Registration failed. Please try again.
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition-colors duration-300" 
                    type="submit">
                Register
            </button>
        </form>
        <p class="text-center mt-4 text-gray-600">Already have an account? <a href="/login" class="text-blue-500 hover:underline transition-colors">Login</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });
                
                if (response.ok) {
                    // Show success and redirect
                    const formElement = document.querySelector('.relative');
                    formElement.classList.remove('animate__fadeIn');
                    formElement.classList.add('animate__fadeOut');
                    
                    // Create and show success message
                    const successMessage = document.createElement('div');
                    successMessage.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-green-600 text-white p-6 rounded-lg shadow-lg z-50 animate__animated animate__bounceIn';
                    successMessage.innerHTML = '<p class="text-xl font-bold">Registration Successful!</p><p class="mt-2">Redirecting to login...</p>';
                    document.body.appendChild(successMessage);
                    
                    // Redirect after delay
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    const data = await response.json();
                    document.getElementById('errorMessage').textContent = data.message || 'Registration failed. Please try again.';
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error registering:', error);
                document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
