<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 128, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .bg-finance {
            background-image: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-finance flex items-center justify-center h-screen">
    <div class="absolute inset-0 bg-black bg-opacity-60"></div>
    
    <div id="successMessage" class="success-message hidden animate__animated animate__bounceIn">
        Login Successful!
    </div>
    
    <div class="relative z-10 bg-white p-8 rounded-lg shadow-2xl w-96 animate__animated animate__fadeIn">
        <h2 class="text-3xl font-bold mb-6 text-blue-600 text-center">Finance Tracker</h2>
        <h3 class="text-xl font-semibold mb-4 text-gray-800">Login</h3>
        
        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">Email</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500 transition-all" 
                       id="email" 
                       type="email" 
                       required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500 transition-all" 
                       id="password" 
                       type="password" 
                       required>
            </div>
            <div id="errorMessage" class="text-red-500 text-sm mb-4 hidden">
                Invalid email or password. Please try again.
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition-colors duration-300" 
                    type="submit">
                Login
            </button>
        </form>
        <p class="text-center mt-4 text-gray-600">Don't have an account? <a href="/signup" class="text-blue-500 hover:underline transition-colors">Register</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Show success message with animation
                    const successMessage = document.getElementById('successMessage');
                    successMessage.classList.remove('hidden');
                    successMessage.classList.add('animate__bounceIn');
                    
                    // Hide the login form with animation
                    document.querySelector('.relative').classList.remove('animate__fadeIn');
                    document.querySelector('.relative').classList.add('animate__fadeOut');
                    
                    // Redirect after a short delay
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    // Show error message
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error logging in:', error);
                document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
