<div class="modal-header">
    <h3 class="text-lg font-medium">Add New Vendor</h3>
</div>
<form id="vendorForm" class="modal-body">
    <div class="form-group">
        <label class="form-label">Vendor Name</label>
        <input type="text" id="vendorName" class="form-input" required>
    </div>
    <div class="form-group">
        <label class="form-label">Contact Information</label>
        <input type="text" id="vendorContact" class="form-input">
    </div>
</form>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    <button type="submit" form="vendorForm" class="btn btn-primary">Save Vendor</button>
</div>
